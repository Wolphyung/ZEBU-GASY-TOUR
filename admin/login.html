<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ZEBU GASY TOUR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0F1A1F 0%, #1E2A2F 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(198,164,59,0.2);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card .logo { text-align: center; margin-bottom: 2rem; }
    .login-card .logo img { height: 60px; }
    .login-card .logo h2 { color: #fff; font-weight: 700; margin-top: 0.5rem; }
    .login-card .logo span { color: #C6A43B; }
    .form-control {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 12px;
      padding: 12px 16px;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.12);
      border-color: #C6A43B;
      box-shadow: 0 0 0 3px rgba(198,164,59,0.2);
      color: #fff;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.4); }
    .btn-login {
      background: linear-gradient(135deg, #C6A43B, #DAB75D);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      color: #1E2A2F;
      transition: all 0.3s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(198,164,59,0.3); }
    .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .back-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85rem; }
    .back-link:hover { color: #C6A43B; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <img src="../Image/logo_zebugasytour-removebg-preview.png" alt="ZEBU GASY TOUR">
      <h2>Admin <span>ZGT</span></h2>
      <p style="color: rgba(255,255,255,0.3); font-size: 0.85rem;">Espace de gestion</p>
    </div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label text-white-50">Identifiant</label>
        <input type="text" id="username" class="form-control" placeholder="admin" value="admin">
      </div>
      <div class="mb-3">
        <label class="form-label text-white-50">Mot de passe</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" value="admin123">
      </div>
      <div id="errorMsg" class="error-msg"><i class="fas fa-exclamation-circle me-1"></i> Identifiants incorrects</div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>
    <div class="text-center mt-3">
      <a href="../index.html" class="back-link"><i class="fas fa-arrow-left me-1"></i> Retour au site</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem('admin_logged_in', 'true');
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.style.display = 'block';
        setTimeout(() => errorMsg.style.display = 'none', 3000);
      }
    });
  </script>
</body>
</html>
